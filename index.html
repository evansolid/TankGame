<!DOCTYPE html>
<html>
<head>
  <title>Tank Game</title>
  <style>
    canvas { background: #eef; display:block; margin: 20px auto; border: 1px solid black; }
    input, button { margin: 5px; }
  </style>
</head>
<body>
  <h1>Tank Game 2</h1>

  <div id="lobby">
    <input id="name" placeholder="Enter your name">
    <button onclick="join()">Join Game</button>
  </div>

  <div id="game" style="display:none;">
    <canvas id="gameCanvas" width="800" height="400"></canvas><br>
    Type: <select id="type"><option value="small">Small</option><option value="big">Big</option></select>
    Angle: <input id="angle" type="number" min="0" max="180" value="45">
    Power: <input id="power" type="number" min="1" max="10" value="5">
    <button onclick="sendMove()">Fire</button>
    <p id="status"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
