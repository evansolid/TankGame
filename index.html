<!DOCTYPE html>
<html>
<head>
  <title>Bomb Game</title>
</head>
<body>
<h1>Bomb Game</h1>

<div id="joinScreen">
  <input id="name" placeholder="Enter your name">
  <button onclick="join()">Join</button>
</div>

<div id="lobbyScreen" style="display:none;">
  <h3>Lobby (<span id="playerCount">0</span> players)</h3>
  <p>Your name: <span id="myName"></span></p>
  <ul id="playerList"></ul>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="gameScreen" style="display:none;">
  <p>Your name: <span id="myNameGame"></span></p>
  <p id="turnInfo"></p>
  <p>Players submitted: <span id="votedCount">0</span></p>

  <div id="voteSection">
    <h4>Vote to eliminate:</h4>
    <div id="voteButtons"></div>
  </div>

  <div id="passSection" style="display:none;">
    <h4>You have the bomb! Pass it to:</h4>
    <div id="passButtons"></div>
  </div>

  <button onclick="submitTurn()">Submit Turn</button>
  <h4>Log:</h4>
  <div id="gameLog"></div>
  <button onclick="resetGame()">Reset Game</button>
</div>

<script src="app.js"></script>
</body>
</html>
