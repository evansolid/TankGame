<!DOCTYPE html>
<html>
<head>
  <title>Tank Game</title>
</head>
<body>
  <h1>Tank Game</h1>

  <div id="lobby">
    <input id="name" placeholder="Enter your name">
    <button onclick="join()">Join Game</button>
  </div>

  <div id="game" style="display:none;">
    <p id="status"></p>
    <button onclick="sendMove()">Fire</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
