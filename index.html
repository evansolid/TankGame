<!DOCTYPE html>
<html>
<head>
    <title>Tank Game</title>
</head>
<body>
    <h1>Tank Game Test</h1>
    <button onclick="sendMove()">Send Move</button>

    <script>
        const SERVER_URL = "https://cingular-review-heard-bathroom.trycloudflare.com";

        async function sendMove() {
            const res = await fetch(SERVER_URL + "/move", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ player: "test", angle: 45 })
            });

            const data = await res.json();
            console.log(data);
        }
    </script>
</body>
</html>
