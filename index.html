<!DOCTYPE html>
<html>
<head>
  <title>Bomb Game</title>
</head>
<body>

<h2 id="playerName"></h2>

<div id="joinScreen">
  <input id="name" placeholder="Username">
  <button onclick="join()">Join</button>
</div>

<div id="lobbyScreen" style="display:none;">
  <h3>Lobby:</h3>
  <ul id="playerList"></ul>
  <button onclick="start()">Start Game</button>
</div>

<div id="gameScreen" style="display:none;">
  <p id="info"></p>
  <h3>Vote for elimination:</h3>
  <div id="voteList"></div>
  <h3 id="passTitle" style="display:none;">Pass Bomb:</h3>
  <div id="passList"></div>
  <button onclick="submitTurn()">Submit Turn</button>
  <h3>Log:</h3>
  <div id="log"></div>
  <button onclick="reset()">Reset Game</button>
</div>

<script src="app.js"></script>
</body>
</html>
