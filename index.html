<!DOCTYPE html>
<html>
<head>
  <title>Bomb Game</title>
</head>
<body>

<h1>Bomb Game</h1>

<div id="joinScreen">
  <input id="name" placeholder="Username">
  <button onclick="join()">Join</button>
</div>

<div id="lobbyScreen" style="display:none;">
  <h3>Players:</h3>
  <ul id="playerList"></ul>
  <button onclick="start()">Start Game</button>
</div>

<div id="gameScreen" style="display:none;">
  <p id="info"></p>

  <h3>Choose Vote:</h3>
  <div id="voteList"></div>

  <h3 id="passTitle" style="display:none;">Pass Bomb:</h3>
  <div id="passList"></div>

  <button onclick="submitTurn()">Submit Turn</button>

  <h3>Log:</h3>
  <div id="log"></div>

  <button onclick="reset()">Reset</button>
</div>

<script src="app.js"></script>
</body>
</html>
