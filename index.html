<!DOCTYPE html>
<html>
<head>
	<title>Evan's Tank Game</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<div class="canvas-container">
	<canvas id="background" width="1002px" height="625px"></canvas>
	<canvas id="game-board" width="1000px" height="625px"></canvas>
	<div class="modal">
		<div id="modal-inner">
		</div>
	</div>
</div>
<div class="info-container">
	<div id="turn"></div>
	<div id="power"></div>
	<div id="angle"></div>
</div>

<div id="button-container">
	<button id="2players">Two Players</button>
	<button id="3players">Three Players</button>
	<button id="4players">Four Players</button>
</div>


<p>How to play: 
  Use the left and right arrow keys to angle the cannon </br>
  Use the up and down arrow keys to change the power of the cannon </br>
  Press spacebar to fire your cannon </br>
  the last tank remaining wins!</p>

<script type="text/javascript" src="js/app.js"></script>
</body>
</html>
